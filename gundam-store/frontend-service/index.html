<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gundam Universe - Gunpla Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white" style="font-family: 'Rajdhani', sans-serif;">

    <header class="bg-gray-800 p-6 shadow-lg border-b border-blue-500 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-blue-400">GUNDAM UNIVERSE</h1>
            <p class="text-gray-400 text-sm mt-1">Gundam Plastic Model Kit Catalogue</p>
        </div>

        <div class="bg-gray-900 border border-gray-700 p-3 rounded-lg flex items-center gap-3 shadow-inner">
            <span class="text-blue-400 font-bold uppercase tracking-wider">Cart:</span>
            <span id="cart-count" class="bg-blue-600 text-white px-3 py-1 rounded-full font-bold">0</span>
            <span id="cart-total" class="text-green-400 font-bold ml-2 text-xl">Rp 0</span>
        </div>

        <button onclick="checkout()" class="ml-4 bg-green-500 hover:bg-green-400 text-gray-900 font-bold py-1 px-4 rounded transition">
    Checkout
</button>

    </header>

    <main class="container mx-auto p-8">
        <h2 class="text-2xl font-semibold mb-6">Available Units</h2>

        <div id="kit-container" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <p class="text-gray-400">Booting up catalogue...</p>
        </div>
    </main>

    <script>

        async function loadKits() {
            try {
                const response = await fetch('http://localhost:8002/api/kits');
                const kits = await response.json();

                const container = document.getElementById('kit-container');
                container.innerHTML = '';

                kits.forEach(kit => {
                    // 1. Create the Rupiah formatter
                    const formatRupiah = new Intl.NumberFormat('id-ID', {
                        style: 'currency',
                        currency: 'IDR',
                        minimumFractionDigits: 0 // This removes the annoying ,00 at the end
                    }).format(kit.price);

                    // 2. Inject it into the card
                    const card = `
        <div class="bg-gray-800 p-5 rounded-lg border border-gray-700 shadow-xl hover:border-blue-400 transition duration-300 flex flex-col h-full">
            <div class="h-48 w-full mb-4 overflow-hidden rounded bg-gray-900">
                <img src="${kit.image_url}" alt="${kit.name}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/300x200?text=Image+Not+Found'">
            </div>
            <h3 class="text-xl font-bold text-white">${kit.name}</h3>
            <p class="text-blue-400 text-sm font-semibold mb-2">${kit.grade}</p>
            <div class="flex justify-between items-center mt-auto pt-4">
                <span class="text-2xl font-bold text-green-400">${formatRupiah}</span>
                <span id="stock-${kit.id}" class="text-sm text-gray-400">Stock: ${kit.stock}</span>
            </div>
            <button onclick="addToCart(${kit.id}, '${kit.name}', ${kit.price})" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition active:scale-95">
    Add to Cart
</button>
        </div>
    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                console.error("Gateway connection failed:", error);
                document.getElementById('kit-container').innerHTML = `<p class="text-red-500">Error loading catalogue. Is the Gateway running?</p>`;
            }
        }


        window.onload = loadKits;

        let cart = [];
        let cartTotal = 0;

        function addToCart(kitId, kitName, kitPrice) {
            let stockElement = document.getElementById(`stock-${kitId}`);
            let currentStock = parseInt(stockElement.innerText.replace('Stock: ', ''));

            if (currentStock <= 0) {
                alert(`Sorry, ${kitName} is out of stock!`);
                return;
            }

            stockElement.innerText = `Stock: ${currentStock - 1}`;

            cart.push({ id: kitId, name: kitName, price: kitPrice });
            cartTotal += parseFloat(kitPrice);

            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', minimumFractionDigits: 0
            }).format(cartTotal);


            console.log('Added ${kitName} to cart. Total is now ${cartTotal}');
        }

        async function checkout() {
    if (cart.length === 0) return alert("Your cart is empty!");

    try {
        
        const response = await fetch('http://localhost:8002/api/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cart)
        });

        if (response.ok) {
            alert("Checkout successful! Thank you for your purchase!");

            cart = [];
            cartTotal = 0;
            document.getElementById('cart-count').innerText = 0;
            document.getElementById('cart-total').innerText = 'Rp 0';
            
            loadKits(); 
        } else {
            alert("Checkout failed. Server error.");
        }
    } catch (error) {
        console.error("Checkout error:", error);
    }
}
    </script>
</body>

</html>
